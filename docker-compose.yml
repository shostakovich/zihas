services:
  ziwoas:
    build: .
    image: ziwoas:latest
    container_name: ziwoas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Europe/Berlin
      SECRET_KEY_BASE: dummy_secret_for_local_docker
    volumes:
      - ./data:/rails/data
      - ./config/ziwoas.yml:/rails/config/ziwoas.yml:ro
