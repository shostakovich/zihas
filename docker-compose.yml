services:
  ziwoas:
    build: .
    image: ziwoas:latest
    container_name: ziwoas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Europe/Berlin
      SECRET_KEY_BASE: dummy_secret_for_local_docker
    volumes:
      - ./storage:/rails/storage
      - ./config/ziwoas.yml:/rails/config/ziwoas.yml:ro

  ziwoas_collector:
    image: ziwoas:latest
    container_name: ziwoas_collector
    restart: unless-stopped
    command: ["./bin/ziwoas_collector"]
    environment:
      TZ: Europe/Berlin
      SECRET_KEY_BASE: dummy_secret_for_local_docker
    volumes:
      - ./storage:/rails/storage
      - ./config/ziwoas.yml:/rails/config/ziwoas.yml:ro
    depends_on:
      - ziwoas

  ziwoas_jobs:
    image: ziwoas:latest
    container_name: ziwoas_jobs
    restart: unless-stopped
    command: ["./bin/jobs"]
    environment:
      TZ: Europe/Berlin
      SECRET_KEY_BASE: dummy_secret_for_local_docker
    volumes:
      - ./storage:/rails/storage
      - ./config/ziwoas.yml:/rails/config/ziwoas.yml:ro
    depends_on:
      - ziwoas

  govee2mqtt:
    image: ghcr.io/wez/govee2mqtt:latest
    container_name: govee2mqtt
    restart: unless-stopped
    # Host networking is required for Govee LAN multicast discovery.
    network_mode: host
    command: ["--hass-discovery-prefix", "gv2mqtt", "serve"]
    env_file:
      - config/govee2mqtt.env
    volumes:
      - govee2mqtt_data:/data

volumes:
  govee2mqtt_data:
